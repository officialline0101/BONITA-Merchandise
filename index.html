<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BONITA 商品取り置き依頼</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- 変数定義 (BONITAカラー) --- */
        :root {
            --primary-color: #d4d845;
            --primary-light: #f4f6d8;
            --text-color: #4a4a4a;
            --accent-black: #333333;
            --bg-color: #fdfdfb;
            --border-radius: 4px;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#ecece2 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            padding-bottom: 60px;
            color: var(--text-color);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 95%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
            border-top: 5px solid var(--primary-color);
        }

        h1 {
            font-family: 'Shippori Mincho', serif;
            color: var(--accent-black);
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        h1::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-2deg);
            width: 80%;
            height: 40px;
            background-color: var(--primary-color);
            opacity: 0.4;
            z-index: -1;
            border-radius: 20% 80% 20% 80% / 80% 20% 80% 20%;
        }

        .info-text {
            font-size: 13px;
            color: var(--text-color);
            background-color: var(--primary-light);
            padding: 15px;
            border-radius: var(--border-radius);
            line-height: 1.6;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary-color);
        }

        /* --- ラベルデザイン --- */
        .label {
            font-family: 'Shippori Mincho', serif;
            display: flex;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--accent-black);
            font-size: 18px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .step-num {
            display: inline-block;
            background-color: var(--accent-black);
            color: #fff;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            font-size: 12px;
            margin-right: 8px;
            font-family: sans-serif;
            flex-shrink: 0;
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            margin-left: auto;
            font-weight: normal;
        }
        .req { background: #d9534f; color: white; }
        .opt { background: #888; color: white; }

        /* --- 入力フォーム --- */
        input[type="text"], input[type="tel"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 16px;
            background: #fafafa;
            transition: 0.3s;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }
        input:focus, textarea:focus {
            border-color: var(--primary-color);
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212, 216, 69, 0.2);
        }

        /* --- 選択ボタングループ --- */
        .selection-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .selection-group button {
            flex: 1 1 45%;
            padding: 12px 5px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 14px;
        }

        .selection-group button.active {
            background-color: var(--accent-black);
            color: var(--primary-color);
            border-color: var(--accent-black);
            font-weight: bold;
        }

        /* --- チェックボックスリスト --- */
        .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #eee;
            padding: 10px 12px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .checkbox-item:hover {
            background: var(--primary-light);
            border-color: var(--primary-color);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-black);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-item label {
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        /* --- サブエリア表示制御 --- */
        .sub-area {
            margin-top: 12px;
            padding: 15px;
            background-color: var(--primary-light);
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        .sub-area .sub-label {
            font-size: 13px;
            color: var(--accent-black);
            font-weight: 600;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 確認テーブル --- */
        .summary-section {
            margin-top: 30px;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .summary-header {
            background-color: var(--primary-color);
            color: var(--accent-black);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-family: 'Shippori Mincho', serif;
        }

        .summary-block {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        .summary-block:last-child {
            border-bottom: none;
        }

        .summary-block-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .summary-value {
            font-weight: bold;
            font-size: 14px;
            color: var(--accent-black);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* --- 送信ボタン --- */
        .submit-button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: var(--border-radius);
            background-color: var(--accent-black);
            color: var(--primary-color);
            font-size: 18px;
            font-weight: bold;
            font-family: 'Shippori Mincho', serif;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* --- モバイル調整 --- */
        @media (max-width: 600px) {
            .container { padding: 15px; width: 100%; border-radius: 0; min-height: 100vh; }
            h1 { font-size: 20px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>商品取り置き依頼</h1>

        <div class="info-text">
            ご希望の商品を選択し、内容をご確認の上送信してください。
        </div>

        <!-- ①お名前 -->
        <div class="label"><span class="step-num">1</span>お名前 <span class="badge req">必須</span></div>
        <input type="text" id="userName" placeholder="例：山田 花子">

        <!-- ②お電話番号 -->
        <div class="label"><span class="step-num">2</span>お電話番号 <span class="badge req">必須</span></div>
        <input type="tel" id="userPhone" placeholder="例：090-1234-5678">

        <!-- ③購入履歴 -->
        <div class="label"><span class="step-num">3</span>商品をご購入されたことはありますか？ <span class="badge req">必須</span></div>
        <div class="selection-group" id="historyGroup">
            <button type="button" id="historyYes" onclick="selectHistory(this, 'yes')">はい</button>
            <button type="button" id="historyNo" onclick="selectHistory(this, 'no')">いいえ</button>
        </div>
        <!-- はい選択時：商品名入力 -->
        <div id="historyDetailArea" style="display:none;">
            <div class="sub-area">
                <div class="sub-label">はいを選んだ方は、商品名をお聞かせください。<span class="badge opt" style="margin-left:6px;">任意</span></div>
                <input type="text" id="pastProductName" placeholder="商品名をご記入ください">
            </div>
        </div>

        <!-- ④購入希望商品 -->
        <div class="label"><span class="step-num">4</span>購入希望商品をお選びください。 <span class="badge req">必須</span></div>
        <div class="selection-group" id="categoryGroup">
            <button type="button" id="catFace" onclick="selectCategory('face')">【ホームケア用品】face</button>
            <button type="button" id="catBody" onclick="selectCategory('body')">【ホームケア用品】body</button>
        </div>

        <!-- ④-1 faceカテゴリ商品一覧 -->
        <div id="faceProductArea" style="display:none;">
            <div class="sub-area">
                <div class="sub-label">商品を選択してください（複数選択可）</div>
                <div class="checkbox-list" id="faceCheckboxList">
                    <!-- JSで生成 -->
                </div>
            </div>
        </div>

        <!-- ④-2 bodyカテゴリ商品一覧 -->
        <div id="bodyProductArea" style="display:none;">
            <div class="sub-area">
                <div class="sub-label">商品を選択してください（複数選択可）</div>
                <div class="checkbox-list" id="bodyCheckboxList">
                    <!-- JSで生成 -->
                </div>
            </div>
        </div>

        <!-- ⑤受け取り希望日時 -->
        <div class="label"><span class="step-num">5</span>受け取り希望日時 <span class="badge req">必須</span></div>
        <div class="selection-group" id="pickupGroup">
            <button type="button" id="pickupVisit" onclick="selectPickup(this, 'visit')">施術日に受け取る</button>
            <button type="button" id="pickupDesignate" onclick="selectPickup(this, 'designate')">希望日時で受け取る</button>
        </div>
        <!-- ⑤-1 希望日時入力 -->
        <div id="pickupDetailArea" style="display:none;">
            <div class="sub-area">
                <div class="sub-label">希望日を教えてください。<span class="badge opt" style="margin-left:6px;">任意</span></div>
                <input type="text" id="pickupDateText" placeholder="例：5月20日の14時頃">
            </div>
        </div>

        <!-- 確認エリア -->
        <div class="summary-section">
            <div class="summary-header">ご依頼内容確認</div>

            <div class="summary-block">
                <div class="summary-block-title">①お名前</div>
                <div id="dispName" class="summary-value">(未入力)</div>
            </div>
            <div class="summary-block">
                <div class="summary-block-title">②お電話番号</div>
                <div id="dispPhone" class="summary-value">(未入力)</div>
            </div>
            <div class="summary-block">
                <div class="summary-block-title">③購入履歴</div>
                <div id="dispHistory" class="summary-value">(未選択)</div>
            </div>
            <div class="summary-block">
                <div class="summary-block-title">④購入希望商品</div>
                <div id="dispProducts" class="summary-value">(未選択)</div>
            </div>
            <div class="summary-block">
                <div class="summary-block-title">⑤受け取り希望日時</div>
                <div id="dispPickup" class="summary-value">(未選択)</div>
            </div>
        </div>

        <button class="submit-button" onclick="submitForm()">この内容で依頼する</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

    <script>
        // --- 商品データ定義 ---
        const faceProducts = [
            'クレンジング',
            'ピュアモイスチャーソープ',
            'ピュアモイスチャーウォーター',
            'ウォッシュパウダークリア',
            'プラチナピール',
            '透輝の滴',
            'V-Cセラム',
            'リッチホワイトエッセンス',
            'UVミルク',
            'ノンケミカル　サンカットスプレー'
        ];

        const bodyProducts = [
            'ジェンダーレスジェルソープ',
            'スキンハプティクス',
            'エメールソア',
            '沖縄産｜ブリーズミスト',
            '沖縄産｜万能バーム',
            'よもぎ・薬湯',
            'ベリー',
            'アセロラ',
            'ストロベリー',
            '美的青汁',
            'ダイエット酵素ゼリー'
        ];

        // --- 状態管理 ---
        let state = {
            history: '',       // 'はい' or 'いいえ'
            pastProduct: '',   // 以前購入した商品名
            category: '',      // 'face' or 'body'
            pickupType: '',    // '施術日に受け取る' or '希望日時で受け取る'
            pickupDate: ''
        };

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', function () {
            // チェックボックスリストを生成
            buildCheckboxList('faceCheckboxList', faceProducts, 'face');
            buildCheckboxList('bodyCheckboxList', bodyProducts, 'body');

            // localStorageから名前・電話番号を復元
            const savedName = localStorage.getItem('bonita_name');
            const savedPhone = localStorage.getItem('bonita_phone');
            if (savedName) document.getElementById('userName').value = savedName;
            if (savedPhone) document.getElementById('userPhone').value = savedPhone;
            updateSummary();

            // リアルタイム同期
            document.getElementById('userName').addEventListener('input', function () {
                localStorage.setItem('bonita_name', this.value);
                document.getElementById('dispName').innerText = this.value || '(未入力)';
            });
            document.getElementById('userPhone').addEventListener('input', function () {
                localStorage.setItem('bonita_phone', this.value);
                document.getElementById('dispPhone').innerText = this.value || '(未入力)';
            });
            document.getElementById('pickupDateText').addEventListener('input', updateSummaryPickup);

            // LIFF初期化
            liff.init({ liffId: '2008703786-OPIicte0' })
                .then(() => console.log('LIFF init'))
                .catch((err) => console.error('LIFF error', err));
        });

        // チェックボックスリストを動的生成する関数
        function buildCheckboxList(containerId, products, prefix) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            products.forEach((name, i) => {
                const id = `chk_${prefix}_${i}`;
                const item = document.createElement('label');
                item.className = 'checkbox-item';
                item.innerHTML = `
                    <input type="checkbox" id="${id}" value="${name}" onchange="updateSummaryProducts()">
                    <label for="${id}">${name}</label>
                `;
                container.appendChild(item);
            });
        }

        // ③ 購入履歴選択
        function selectHistory(btn, val) {
            document.querySelectorAll('#historyGroup button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.history = (val === 'yes') ? 'はい' : 'いいえ';

            const area = document.getElementById('historyDetailArea');
            area.style.display = (val === 'yes') ? 'block' : 'none';

            updateSummaryHistory();
        }

        // ④ カテゴリ選択
        function selectCategory(cat) {
            document.querySelectorAll('#categoryGroup button').forEach(b => b.classList.remove('active'));
            document.getElementById(cat === 'face' ? 'catFace' : 'catBody').classList.add('active');

            state.category = cat;

            // 反対カテゴリのチェックをリセット
            if (cat === 'face') {
                document.getElementById('faceProductArea').style.display = 'block';
                document.getElementById('bodyProductArea').style.display = 'none';
                // bodyのチェックをクリア
                document.querySelectorAll('#bodyCheckboxList input[type="checkbox"]').forEach(c => c.checked = false);
            } else {
                document.getElementById('bodyProductArea').style.display = 'block';
                document.getElementById('faceProductArea').style.display = 'none';
                // faceのチェックをクリア
                document.querySelectorAll('#faceCheckboxList input[type="checkbox"]').forEach(c => c.checked = false);
            }

            updateSummaryProducts();
        }

        // ⑤ 受け取り希望日時選択
        function selectPickup(btn, val) {
            document.querySelectorAll('#pickupGroup button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.pickupType = (val === 'visit') ? '施術日に受け取る' : '希望日時で受け取る';

            const area = document.getElementById('pickupDetailArea');
            area.style.display = (val === 'designate') ? 'block' : 'none';

            updateSummaryPickup();
        }

        // --- サマリー更新 ---
        function updateSummary() {
            document.getElementById('dispName').innerText = document.getElementById('userName').value || '(未入力)';
            document.getElementById('dispPhone').innerText = document.getElementById('userPhone').value || '(未入力)';
            updateSummaryHistory();
            updateSummaryProducts();
            updateSummaryPickup();
        }

        function updateSummaryHistory() {
            let text = state.history || '(未選択)';
            if (state.history === 'はい') {
                const past = document.getElementById('pastProductName').value;
                if (past) text += `（${past}）`;
            }
            document.getElementById('dispHistory').innerText = text;
        }

        function updateSummaryProducts() {
            const listId = state.category === 'face' ? 'faceCheckboxList' : 'bodyCheckboxList';
            const checked = [];
            if (state.category) {
                document.querySelectorAll(`#${listId} input[type="checkbox"]:checked`).forEach(c => {
                    checked.push('・' + c.value);
                });
            }
            const catLabel = state.category === 'face' ? '【ホームケア用品】face\n' : state.category === 'body' ? '【ホームケア用品】body\n' : '';
            document.getElementById('dispProducts').innerText = checked.length > 0
                ? catLabel + checked.join('\n')
                : '(未選択)';
        }

        function updateSummaryPickup() {
            let text = state.pickupType || '(未選択)';
            if (state.pickupType === '希望日時で受け取る') {
                const detail = document.getElementById('pickupDateText').value;
                if (detail) text += `\n${detail}`;
            }
            document.getElementById('dispPickup').innerText = text;
        }

        // --- 送信処理 ---
        function submitForm() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const pastProduct = document.getElementById('pastProductName').value.trim();
            const pickupDateText = document.getElementById('pickupDateText').value.trim();

            // バリデーション
            if (!name) { alert('①お名前を入力してください'); return; }
            if (!phone) { alert('②お電話番号を入力してください'); return; }
            if (!state.history) { alert('③ご購入履歴を選択してください'); return; }
            if (!state.category) { alert('④購入希望商品のカテゴリを選択してください'); return; }

            const listId = state.category === 'face' ? 'faceCheckboxList' : 'bodyCheckboxList';
            const selectedProducts = [];
            document.querySelectorAll(`#${listId} input[type="checkbox"]:checked`).forEach(c => {
                selectedProducts.push(c.value);
            });
            if (selectedProducts.length === 0) { alert('④商品を1つ以上選択してください'); return; }
            if (!state.pickupType) { alert('⑤受け取り希望日時を選択してください'); return; }

            // メッセージ構築
            const catLabel = state.category === 'face' ? '【ホームケア用品】face' : '【ホームケア用品】body';
            const sep = '─────────────';
            let msg = `商品取り置き依頼\n`;
            msg += `${sep}\n\n`;

            msg += `■ お名前\n`;
            msg += `${name}\n\n`;

            msg += `■ お電話番号\n`;
            msg += `${phone}\n\n`;

            msg += `■ ご購入履歴\n`;
            msg += `${state.history}\n`;
            if (state.history === 'はい' && pastProduct) {
                msg += `（以前の商品：${pastProduct}）\n`;
            }
            msg += `\n`;

            msg += `■ 購入希望商品\n`;
            msg += `${catLabel}\n`;
            selectedProducts.forEach(p => { msg += `・${p}\n`; });
            msg += `\n`;

            msg += `■ 受け取り希望日時\n`;
            msg += `${state.pickupType}\n`;
            if (state.pickupType === '希望日時で受け取る' && pickupDateText) {
                msg += `希望日：${pickupDateText}\n`;
            }

            msg += `\n${sep}`;

            // 送信
            if (!liff.isInClient()) {
                alert('LINEアプリ外でのテスト送信:\n\n' + msg);
            } else {
                liff.sendMessages([{ type: 'text', text: msg }])
                    .then(() => {
                        alert('依頼を送信しました。スタッフが返信しますので、少々お待ちください。');
                        liff.closeWindow();
                    })
                    .catch((err) => {
                        alert('送信エラーが発生しました');
                    });
            }
        }
    </script>
</body>
</html>
